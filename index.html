<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PlayStore Style – Digital File Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8fafc; overflow-x: hidden; }
        
        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scalePop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); } 70% { box-shadow: 0 0 0 15px rgba(37,99,235,0); } 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); } }
        
        .navbar { background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 1rem 2rem; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #2563eb, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .product-card { background: white; border-radius: 28px; overflow: hidden; transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.03); cursor: pointer; animation: fadeInUp 0.4s ease; }
        .product-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 25px 40px -12px rgba(0,0,0,0.15); }
        .product-img { height: 200px; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-img { transform: scale(1.05); }
        .rating-stars { color: #fbbf24; font-size: 0.9rem; }
        .like-btn { background: none; border: none; cursor: pointer; transition: 0.2s; }
        .like-btn:hover { transform: scale(1.2); color: #ef4444; }
        .btn-buy { background: linear-gradient(90deg, #2563eb, #7c3aed); border: none; border-radius: 60px; padding: 8px 20px; color: white; transition: all 0.2s; }
        .btn-buy:active { animation: scalePop 0.2s; }
        .modal-content { border-radius: 32px; overflow: hidden; animation: fadeInUp 0.3s; }
        .detail-img { max-height: 350px; object-fit: contain; width: 100%; border-radius: 24px; }
        .toast-notif { position: fixed; bottom: 20px; right: 20px; z-index: 1100; min-width: 250px; background: #1e293b; color: white; border-radius: 60px; padding: 12px 20px; animation: fadeInUp 0.3s; }
        .dropdown-custom { position: absolute; top: 55px; right: 0; background: white; border-radius: 24px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15); width: 280px; z-index: 1000; display: none; }
        @media (max-width: 768px) { .product-card { margin-bottom: 1rem; } }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, update, push, onValue, query, orderByChild, equalTo, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApq6Rf4cp6IbIIXdhJWaYSfX0HrYVkKKo",
        authDomain: "rgfff-19a9e.firebaseapp.com",
        databaseURL: "https://rgfff-19a9e-default-rtdb.firebaseio.com",
        projectId: "rgfff-19a9e",
        storageBucket: "rgfff-19a9e.firebasestorage.app",
        appId: "1:969291045242:android:0c58df4785239d3e4f1ec3"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let messaging = null;
    try { messaging = getMessaging(app); } catch(e) { console.log("FCM not supported"); }

    let currentUser = null;
    let currentFcmToken = null;
    let unsubscribeWallet = null;

    const showToast = (msg, icon="success") => Swal.fire({ toast:true, position:'top-end', icon, title:msg, showConfirmButton:false, timer:3000 });
    const showDialog = (title, msg, icon="info") => Swal.fire({ title, text:msg, icon, confirmButtonColor:'#2563eb' });

    async function createUserProfile(user) {
        const userRef = ref(db, `users/${user.uid}`);
        const snap = await get(userRef);
        if(!snap.exists()) await set(userRef, { email:user.email, walletBalance:0, role:"user", createdAt:Date.now(), lastLogin:Date.now() });
        else await update(userRef, { lastLogin:Date.now() });
    }

    async function handleLogin(email, password) {
        try {
            const cred = await signInWithEmailAndPassword(auth, email, password);
            const userSnap = await get(ref(db, `users/${cred.user.uid}`));
            if(userSnap.val()?.banned === true) { await signOut(auth); showDialog("Banned", "Your account is banned.", "error"); return false; }
            showToast("Logged in!");
            return true;
        } catch(err) { showDialog("Login Failed", err.message, "error"); return false; }
    }
    async function handleRegister(email, password) {
        try { const cred = await createUserWithEmailAndPassword(auth, email, password); await createUserProfile(cred.user); showToast("Registered! Please login."); return true; } 
        catch(err) { showDialog("Registration Failed", err.message, "error"); return false; }
    }
    async function logoutUser() { await signOut(auth); renderAuthScreen(); }

    async function requestNotificationPermission() {
        if(!messaging) { alert("Browser doesn't support push notifications"); return; }
        if(Notification.permission === "granted") { alert("Already granted"); return; }
        const permission = await Notification.requestPermission();
        if(permission === "granted") {
            try {
                const token = await getToken(messaging, { vapidKey: "BElZ3xqW0ZvC5tY4nQ... (use your VAPID key from Firebase console)" });
                // Note: actual VAPID key required for production; but Firebase SDK auto-generates? Actually you need to generate from console.
                // For demo, we'll still store token if available.
                if(token) {
                    currentFcmToken = token;
                    await set(ref(db, `fcmTokens/${currentUser.uid}`), token);
                    showToast("Notifications enabled");
                }
            } catch(e) { console.log(e); alert("Error getting token: " + e.message); }
        }
    }

    function attachWalletListener(uid) {
        if(unsubscribeWallet) unsubscribeWallet();
        const walletRef = ref(db, `users/${uid}/walletBalance`);
        unsubscribeWallet = onValue(walletRef, (snap) => {
            const balance = snap.val() ?? 0;
            document.getElementById("walletBalanceDisplay")?.innerText = `₹${balance}`;
            document.getElementById("profileWalletBalance")?.innerText = `₹${balance}`;
        });
    }

    // Rating and Like functions
    async function rateProduct(productId, rating) {
        if(!currentUser) return;
        const ratingRef = ref(db, `productRatings/${productId}/${currentUser.uid}`);
        const currentRating = await get(ratingRef);
        await set(ratingRef, rating);
        // update average rating in product node
        const allRatingsSnap = await get(ref(db, `productRatings/${productId}`));
        let sum = 0, count = 0;
        if(allRatingsSnap.exists()) {
            Object.values(allRatingsSnap.val()).forEach(r => { sum += r; count++; });
        }
        const avg = count ? sum/count : 0;
        await update(ref(db, `products/${productId}`), { avgRating: avg, ratingCount: count });
        showToast("Rating submitted!");
    }

    async function likeProduct(productId) {
        if(!currentUser) return;
        const likeRef = ref(db, `productLikes/${productId}/${currentUser.uid}`);
        const snap = await get(likeRef);
        const newLike = !snap.val();
        await set(likeRef, newLike);
        // update total likes count
        const allLikesSnap = await get(ref(db, `productLikes/${productId}`));
        let likeCount = 0;
        if(allLikesSnap.exists()) {
            likeCount = Object.values(allLikesSnap.val()).filter(v => v === true).length;
        }
        await update(ref(db, `products/${productId}`), { likeCount: likeCount });
        showToast(newLike ? "Liked!" : "Unliked");
    }

    async function purchaseProduct(productId, price, name) {
        if(!currentUser) { showDialog("Login Required", "Please login first", "error"); return; }
        const userSnap = await get(ref(db, `users/${currentUser.uid}`));
        if(userSnap.val()?.banned) { showDialog("Banned", "You cannot purchase", "error"); return; }
        const walletRef = ref(db, `users/${currentUser.uid}/walletBalance`);
        let balance = (await get(walletRef)).val() || 0;
        if(balance < price) { showDialog("Insufficient Balance", "Please recharge", "error"); return; }
        const confirm = await Swal.fire({ title: "Confirm Purchase", text: `Buy "${name}" for ₹${price}?`, icon: "question", showCancelButton: true });
        if(!confirm.isConfirmed) return;
        await set(walletRef, balance - price);
        const productSnap = await get(ref(db, `products/${productId}`));
        const product = productSnap.val();
        if(!product) { showToast("Product error", "error"); return; }
        const orderId = push(ref(db, 'orders')).key;
        await set(ref(db, `orders/${orderId}`), {
            userId: currentUser.uid, productId, productName: product.name, productPrice: price, fileUrl: product.fileUrl || "#", purchasedAt: Date.now()
        });
        showToast("Purchase successful! Go to My Orders.");
        if(document.getElementById("ordersTab")?.classList.contains("active")) loadMyOrders();
    }

    async function loadProducts() {
        const snap = await get(ref(db, 'products'));
        let prods = [];
        if(snap.exists()) { Object.entries(snap.val()).forEach(([id,p]) => prods.push({ id, ...p })); }
        prods.sort((a,b) => b.createdAt - a.createdAt);
        const container = document.getElementById("productsContainer");
        if(!container) return;
        if(!prods.length) { container.innerHTML = `<div class="col-12 text-center py-5">No products yet.</div>`; return; }
        container.innerHTML = prods.map(p => `
            <div class="col-md-4 col-lg-3 mb-4">
                <div class="product-card" data-id="${p.id}">
                    <img src="${p.photoUrl || 'https://placehold.co/400x300?text=Project'}" class="product-img w-100">
                    <div class="p-3">
                        <h6 class="fw-bold">${escapeHtml(p.name)}</h6>
                        <div class="rating-stars my-1">${renderStars(p.avgRating || 0)} <span class="text-muted small">(${p.ratingCount || 0})</span></div>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="fw-bold text-primary">₹${p.price}</span>
                            <button class="btn-buy btn-sm view-detail" data-id="${p.id}">Details</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.view-detail').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); showProductDetail(btn.dataset.id); });
        document.querySelectorAll('.product-card').forEach(card => card.onclick = () => showProductDetail(card.dataset.id));
    }

    function renderStars(rating) {
        let stars = '';
        for(let i=1;i<=5;i++) stars += `<i class="fas fa-star${i<=rating ? '' : '-o'}"></i>`;
        return stars;
    }

    async function showProductDetail(productId) {
        const snap = await get(ref(db, `products/${productId}`));
        const product = snap.val();
        if(!product) return;
        const userRatingSnap = currentUser ? await get(ref(db, `productRatings/${productId}/${currentUser.uid}`)) : null;
        const userRating = userRatingSnap?.val() || 0;
        const userLikeSnap = currentUser ? await get(ref(db, `productLikes/${productId}/${currentUser.uid}`)) : null;
        const userLiked = userLikeSnap?.val() === true;
        const modalHtml = `
            <div class="modal fade" id="detailModal" tabindex="-1">
                <div class="modal-dialog modal-lg modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header border-0">
                            <h5 class="modal-title fw-bold">${escapeHtml(product.name)}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <img src="${product.photoUrl || 'https://placehold.co/600x400'}" class="detail-img">
                                </div>
                                <div class="col-md-6">
                                    <h3 class="text-primary">₹${product.price}</h3>
                                    <div class="rating-stars fs-5">${renderStars(product.avgRating || 0)} (${product.ratingCount || 0} ratings)</div>
                                    <div class="my-2">
                                        <button class="like-btn" id="likeBtn"><i class="fas fa-heart ${userLiked ? 'text-danger' : 'text-secondary'}"></i> <span id="likeCount">${product.likeCount || 0}</span></button>
                                    </div>
                                    <p class="mt-3">${escapeHtml(product.description || 'No description')}</p>
                                    <p><i class="fas fa-tag"></i> Category: ${product.category || 'General'}</p>
                                    <div class="rating-input mt-3">
                                        <label>Your rating:</label>
                                        <div id="starSelector" class="d-flex gap-1 mt-1">
                                            ${[1,2,3,4,5].map(s => `<i class="fas fa-star ${s <= userRating ? 'text-warning' : 'text-secondary'}" data-rate="${s}" style="cursor:pointer; font-size:1.5rem;"></i>`).join('')}
                                        </div>
                                    </div>
                                    <button class="btn btn-buy w-100 mt-3" id="buyNowModal">Buy Now</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modalEl = document.getElementById('detailModal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
        // rating stars interaction
        document.querySelectorAll('#starSelector .fa-star').forEach(star => {
            star.onclick = async () => {
                const rate = parseInt(star.dataset.rate);
                await rateProduct(productId, rate);
                modal.hide();
                modalEl.remove();
                showProductDetail(productId);
            };
        });
        document.getElementById('likeBtn')?.addEventListener('click', async () => {
            await likeProduct(productId);
            modal.hide();
            modalEl.remove();
            showProductDetail(productId);
        });
        document.getElementById('buyNowModal')?.addEventListener('click', async () => {
            await purchaseProduct(productId, product.price, product.name);
            modal.hide();
            modalEl.remove();
        });
        modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());
    }

    async function loadMyOrders() {
        if(!currentUser) return;
        const snap = await get(ref(db, 'orders'));
        let orders = [];
        if(snap.exists()) Object.entries(snap.val()).forEach(([id,o]) => { if(o.userId === currentUser.uid) orders.push({ id, ...o }); });
        orders.sort((a,b) => b.purchasedAt - a.purchasedAt);
        const container = document.getElementById("ordersContainer");
        if(!container) return;
        if(!orders.length) { container.innerHTML = `<div class="text-center py-5">No orders yet.</div>`; return; }
        container.innerHTML = orders.map(o => `
            <div class="card mb-3 p-3 rounded-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div><h6 class="mb-0">${escapeHtml(o.productName)}</h6><small>₹${o.productPrice} • ${new Date(o.purchasedAt).toLocaleString()}</small></div>
                    ${o.fileUrl && o.fileUrl !== "#" ? `<a href="${o.fileUrl}" class="btn-buy btn-sm" target="_blank" download><i class="fas fa-download"></i> Download</a>` : `<span class="text-muted">No file</span>`}
                </div>
            </div>
        `).join('');
    }

    // Recharge, Notifications, Profile (same as before but improved)
    async function requestRecharge(amount, paymentId) {
        if(!currentUser || !amount || amount<=0 || !paymentId.trim()) { showToast("Valid amount & payment ID required","error"); return; }
        await push(ref(db, 'rechargeRequests'), {
            userId: currentUser.uid, userEmail: currentUser.email, amount: parseFloat(amount), paymentId, status: 'pending', timestamp: Date.now()
        });
        showToast("Request sent. Admin will approve.");
    }

    async function showRechargeModal() {
        const configSnap = await get(ref(db, 'settings/upiConfig'));
        const config = configSnap.exists() ? configSnap.val() : { upiId:"admin@upi", qrImageUrl:"", instruction:"Pay to this UPI ID" };
        const modalHtml = `
            <div class="modal fade" id="rechargeModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header"><h5>Recharge Wallet</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                        <div class="modal-body text-center">
                            ${config.qrImageUrl ? `<img src="${config.qrImageUrl}" style="max-width:150px;" class="mb-3">` : ""}
                            <div class="bg-light p-3 rounded"><strong>UPI ID:</strong> <span id="upiSpan">${config.upiId}</span> <button class="btn btn-sm btn-outline-secondary copyBtn">Copy</button><br><small>${config.instruction}</small></div>
                            <input type="number" id="rechargeAmount" class="form-control my-2" placeholder="Amount (₹)">
                            <input type="text" id="paymentId" class="form-control mb-2" placeholder="Transaction ID">
                            <button class="btn btn-primary w-100" id="submitRecharge">Submit</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modalEl = document.getElementById('rechargeModal');
        const modal = new bootstrap.Modal(modalEl);
        document.querySelector('.copyBtn')?.add
