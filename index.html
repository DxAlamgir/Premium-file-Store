<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ফাইলস্টোর – মোবাইল নোটিফিকেশন ডেমো</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', system-ui; }
        .card { border-radius: 24px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-primary { background: #2563eb; border-radius: 60px; padding: 10px 24px; }
        #status { transition: all 0.2s; }
    </style>
</head>
<body>
<div id="app" class="container py-4"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApq6Rf4cp6IbIIXdhJWaYSfX0HrYVkKKo",
        authDomain: "rgfff-19a9e.firebaseapp.com",
        databaseURL: "https://rgfff-19a9e-default-rtdb.firebaseio.com",
        projectId: "rgfff-19a9e",
        storageBucket: "rgfff-19a9e.firebasestorage.app",
        appId: "1:969291045242:android:0c58df4785239d3e4f1ec3"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let notificationUnsubscribe = null;

    // অনুমতি চেয়ে নোটিফিকেশন সক্রিয় করা
    async function enableNotifications() {
        if (!currentUser) {
            alert("দয়া করে আগে লগইন করুন");
            return;
        }
        if (!("Notification" in window)) {
            alert("এই ব্রাউজার নোটিফিকেশন সাপোর্ট করে না");
            return;
        }
        if (Notification.permission === "granted") {
            alert("নোটিফিকেশন ইতিমধ্যে অনুমোদিত");
            startListeningForNotifications();
            return;
        }
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
            alert("✅ নোটিফিকেশন অনুমোদিত! এখন এডমিন প্যানেল থেকে মেসেজ পাঠালে আপনি ফোনে পাবেন।");
            startListeningForNotifications();
        } else {
            alert("❌ অনুমতি দেওয়া হয়নি। নোটিফিকেশন পেতে ব্রাউজার সেটিংস থেকে চেঞ্জ করুন।");
        }
    }

    // রিয়েল-টাইম নোটিফিকেশন লিসেনার শুরু করা
    function startListeningForNotifications() {
        if (notificationUnsubscribe) notificationUnsubscribe();
        const userNotifRef = query(ref(db, 'notifications'), orderByChild('toUserId'), equalTo(currentUser.uid));
        notificationUnsubscribe = onValue(userNotifRef, (snapshot) => {
            snapshot.forEach((childSnapshot) => {
                const notif = childSnapshot.val();
                if (!notif.read && notif.message) {
                    // ব্রাউজার নোটিফিকেশন দেখানো
                    new Notification(notif.title || "📢 নতুন বার্তা", {
                        body: notif.message,
                        icon: "https://cdn-icons-png.flaticon.com/512/1828/1828643.png",
                        vibrate: [200, 100, 200]
                    });
                    // মার্ক as read যাতে বারবার না দেখায়
                    childSnapshot.ref.update({ read: true });
                }
            });
        });
    }

    // লগইন / রেজিস্টার UI
    async function renderAuth() {
        document.getElementById("app").innerHTML = `
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card p-4 text-center">
                        <h3><i class="fas fa-bell text-primary"></i> নোটিফিকেশন ডেমো</h3>
                        <div class="mt-3">
                            <input type="email" id="email" class="form-control mb-2" placeholder="ইমেইল">
                            <input type="password" id="password" class="form-control mb-2" placeholder="পাসওয়ার্ড">
                            <button id="loginBtn" class="btn btn-primary w-100 mb-2">লগইন</button>
                            <button id="registerBtn" class="btn btn-outline-secondary w-100">নতুন রেজিস্টার</button>
                            <div id="authMsg" class="mt-2 text-danger"></div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("email").value;
            const pwd = document.getElementById("password").value;
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
                location.reload();
            } catch (e) { document.getElementById("authMsg").innerText = e.message; }
        };
        document.getElementById("registerBtn").onclick = async () => {
            const email = document.getElementById("email").value;
            const pwd = document.getElementById("password").value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pwd);
                await set(ref(db, `users/${cred.user.uid}`), { email, walletBalance: 0, role: "user", createdAt: Date.now() });
                alert("রেজিস্ট্রেশন সফল! এখন লগইন করুন।");
            } catch (e) { document.getElementById("authMsg").innerText = e.message; }
        };
    }

    function renderUserDashboard() {
        document.getElementById("app").innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2><i class="fas fa-mobile-alt text-primary"></i> নোটিফিকেশন সিস্টেম</h2>
                <button id="logoutBtn" class="btn btn-outline-danger">লগআউট</button>
            </div>
            <div class="card p-4 text-center">
                <h4>স্বাগতম, ${currentUser.email}</h4>
                <button id="enableNotifBtn" class="btn btn-primary btn-lg mt-3">
                    <i class="fas fa-bell"></i> মোবাইল নোটিফিকেশন অনুমতি দিন
                </button>
                <div id="status" class="mt-3 text-muted">
                    ⚡ নোটিফিকেশন অনুমতি দিলে এডমিনের পাঠানো মেসেজ সরাসরি এই ফোনে পপ-আপ দেখাবে।
                </div>
            </div>
            <div class="card mt-4 p-3">
                <h6>📌 কীভাবে টেস্ট করবেন?</h6>
                <ol class="small">
                    <li>উপরের বাটনে ক্লিক করে নোটিফিকেশন অনুমতি দিন।</li>
                    <li>এডমিন প্যানেল খুলে (দ্বিতীয় ফাইল) লগইন করুন <code>Dx</code> / <code>Alamgir</code>।</li>
                    <li>আপনার ইমেইল সিলেক্ট করে একটি বার্তা লিখে পাঠান।</li>
                    <li>সঙ্গে সঙ্গেই আপনার ফোনে (বা ডেস্কটপে) নোটিফিকেশন আসবে।</li>
                </ol>
            </div>
        `;
        document.getElementById("logoutBtn").onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById("enableNotifBtn").onclick = enableNotifications;
        // যদি আগে থেকেই পারমিশন থাকে, লিসেনার চালু করো
        if (Notification.permission === "granted") {
            startListeningForNotifications();
            document.getElementById("status").innerHTML = "✅ নোটিফিকেশন সক্রিয় আছে। এডমিনের বার্তা এখুনি পৌঁছাবে।";
        }
    }

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            // check if user role admin? থাম্বনেইল ডেমোতে সবাই ইউজার
            renderUserDashboard();
        } else {
            renderAuth();
        }
    });
</script>
</body>
</html>
