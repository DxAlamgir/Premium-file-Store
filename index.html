<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FileStore – Buy & Download</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding-bottom: 20px;
        }
        .navbar {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 12px 16px;
        }
        .logo {
            font-weight: bold;
            font-size: 1.4rem;
            color: #2563eb;
        }
        .wallet-badge {
            background: #eef2ff;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2563eb;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 16px;
            transition: 0.2s;
        }
        .product-card:active {
            transform: scale(0.98);
        }
        .product-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .btn-primary {
            background: #2563eb;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.85rem;
        }
        .btn-sm {
            padding: 4px 12px;
        }
        .rating-stars {
            color: #fbbf24;
            font-size: 0.8rem;
        }
        .modal-content {
            border-radius: 28px;
        }
        .dropdown-menu-custom {
            position: absolute;
            top: 45px;
            right: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 250px;
            z-index: 1000;
            display: none;
        }
        .nav-tabs .nav-link {
            color: #475569;
            font-weight: 500;
            border-radius: 30px;
            margin: 0 4px;
        }
        .nav-tabs .nav-link.active {
            background: #2563eb;
            color: white;
        }
        .toast-notify {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            z-index: 1100;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, update, push, onValue, query, orderByChild, equalTo, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApq6Rf4cp6IbIIXdhJWaYSfX0HrYVkKKo",
        authDomain: "rgfff-19a9e.firebaseapp.com",
        databaseURL: "https://rgfff-19a9e-default-rtdb.firebaseio.com",
        projectId: "rgfff-19a9e",
        storageBucket: "rgfff-19a9e.firebasestorage.app",
        appId: "1:969291045242:android:0c58df4785239d3e4f1ec3"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let messaging = null;
    try { messaging = getMessaging(app); } catch(e) { console.log("FCM not supported"); }

    let currentUser = null;
    let unsubscribeWallet = null;

    function showToast(msg, icon="success") {
        Swal.fire({ toast:true, position:'top-end', icon, title:msg, showConfirmButton:false, timer:3000 });
    }
    function showDialog(title, msg, icon="info") {
        Swal.fire({ title, text:msg, icon, confirmButtonColor:'#2563eb' });
    }

    async function createUserProfile(user) {
        const userRef = ref(db, `users/${user.uid}`);
        const snap = await get(userRef);
        if(!snap.exists()) {
            await set(userRef, { email:user.email, walletBalance:0, role:"user", createdAt:Date.now(), lastLogin:Date.now() });
        } else {
            await update(userRef, { lastLogin:Date.now() });
        }
    }

    async function handleLogin(email, password) {
        try {
            const cred = await signInWithEmailAndPassword(auth, email, password);
            const userSnap = await get(ref(db, `users/${cred.user.uid}`));
            if(userSnap.val()?.banned === true) {
                await signOut(auth);
                showDialog("Banned", "Your account has been banned.", "error");
                return false;
            }
            showToast("Login successful!");
            return true;
        } catch(err) {
            showDialog("Login Failed", err.message, "error");
            return false;
        }
    }

    async function handleRegister(email, password) {
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            await createUserProfile(cred.user);
            showToast("Registered! Please login.");
            return true;
        } catch(err) {
            showDialog("Registration Failed", err.message, "error");
            return false;
        }
    }

    async function logoutUser() {
        await signOut(auth);
        renderAuthScreen();
    }

    function attachWalletListener(uid) {
        if(unsubscribeWallet) unsubscribeWallet();
        const walletRef = ref(db, `users/${uid}/walletBalance`);
        unsubscribeWallet = onValue(walletRef, (snap) => {
            const bal = snap.val() ?? 0;
            document.getElementById("walletBalanceDisplay")?.innerText = `₹${bal}`;
            document.getElementById("profileWalletBalance")?.innerText = `₹${bal}`;
            document.getElementById("walletBalanceLarge")?.innerText = `₹${bal}`;
        });
    }

    function renderStars(rating) {
        let full = Math.floor(rating);
        let stars = '';
        for(let i=1;i<=5;i++) {
            stars += i <= full ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
        }
        return stars;
    }

    async function loadProducts(containerId = "productsContainer") {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = '<div class="text-center py-4">Loading...</div>';
        const snap = await get(ref(db, 'products'));
        let products = [];
        if(snap.exists()) Object.entries(snap.val()).forEach(([id,p]) => products.push({ id, ...p }));
        products.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
        if(products.length === 0) {
            container.innerHTML = '<div class="text-center py-4">No products yet.</div>';
            return;
        }
        container.innerHTML = products.map(p => `
            <div class="col-6 col-md-4 col-lg-3 mb-3">
                <div class="product-card" data-id="${p.id}">
                    <img src="${p.photoUrl || 'https://placehold.co/300x200?text=Product'}" class="product-img">
                    <div class="p-2">
                        <h6 class="fw-bold mb-1">${escapeHtml(p.name)}</h6>
                        <div class="rating-stars mb-1">${renderStars(p.avgRating||0)} (${p.ratingCount||0})</div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold text-primary">₹${p.price}</span>
                            <button class="btn btn-primary btn-sm view-detail" data-id="${p.id}">Buy</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.view-detail').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); showProductDetail(btn.dataset.id); });
        document.querySelectorAll('.product-card').forEach(card => card.onclick = () => showProductDetail(card.dataset.id));
    }

    async function showProductDetail(id) {
        const snap = await get(ref(db, `products/${id}`));
        const p = snap.val();
        if(!p) return;
        let userLiked = false;
        if(currentUser) {
            const likeSnap = await get(ref(db, `productLikes/${id}/${currentUser.uid}`));
            userLiked = likeSnap.val() === true;
        }
        const modalHtml = `
            <div class="modal fade" id="detailModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="fw-bold">${escapeHtml(p.name)}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <img src="${p.photoUrl || 'https://placehold.co/400'}" class="img-fluid rounded-3 mb-3" style="max-height:200px; width:100%; object-fit:contain;">
                            <p>${escapeHtml(p.description || 'No description')}</p>
                            <p><strong>Price: ₹${p.price}</strong></p>
                            <p><i class="fas fa-tag"></i> ${p.category || 'General'}</p>
                            <button class="btn btn-primary w-100" id="buyNowModal">Buy Now</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modalEl = document.getElementById('detailModal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
        document.getElementById('buyNowModal').onclick = async () => {
            if(!currentUser) { showDialog("Login Required", "Please login first", "error"); return; }
            const balance = (await get(ref(db, `users/${currentUser.uid}/walletBalance`))).val() || 0;
            if(balance < p.price) { showDialog("Insufficient Balance", "Please recharge your wallet", "error"); return; }
            const confirm = await Swal.fire({ title: "Confirm", text: `Buy "${p.name}" for ₹${p.price}?`, icon: "question", showCancelButton: true });
            if(!confirm.isConfirmed) return;
            await runTransaction(ref(db, `users/${currentUser.uid}/walletBalance`), (cur) => (cur||0) - p.price);
            const orderId = push(ref(db, 'orders')).key;
            await set(ref(db, `orders/${orderId}`), {
                userId: currentUser.uid, productId: id, productName: p.name, productPrice: p.price, fileUrl: p.fileUrl || "#", purchasedAt: Date.now()
            });
            showToast("Purchase successful! Go to My Orders.");
            modal.hide(); modalEl.remove();
            if(document.getElementById("tabOrders")?.classList.contains("active")) loadMyOrders();
        };
        modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());
    }

    async function loadMyOrders() {
        if(!currentUser) return;
        const snap = await get(ref(db, 'orders'));
        let orders = [];
        if(snap.exists()) Object.entries(snap.val()).forEach(([id,o]) => { if(o.userId === currentUser.uid) orders.push({ id, ...o }); });
        orders.sort((a,b) => b.purchasedAt - a.purchasedAt);
        const container = document.getElementById("ordersContainer");
        if(!container) return;
        if(orders.length === 0) { container.innerHTML = '<div class="text-center py-4">No orders yet.</div>'; return; }
        container.innerHTML = orders.map(o => `
            <div class="card mb-2 p-3 rounded-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div><strong>${escapeHtml(o.productName)}</strong><br><small>₹${o.productPrice} • ${new Date(o.purchasedAt).toLocaleString()}</small></div>
                    ${o.fileUrl && o.fileUrl !== "#" ? `<a href="${o.fileUrl}" class="btn btn-primary btn-sm" download target="_blank"><i class="fas fa-download"></i> Download</a>` : '<span class="text-muted">No file</span>'}
                </div>
            </div>
        `).join('');
    }

    async function requestRecharge(amount, paymentId) {
        if(!currentUser || !amount || amount<=0 || !paymentId.trim()) { showToast("Valid amount & payment ID required","error"); return; }
        await push(ref(db, 'rechargeRequests'), {
            userId: currentUser.uid, userEmail: currentUser.email, amount: parseFloat(amount), paymentId, status: 'pending', timestamp: Date.now()
        });
        showToast("Recharge request sent. Admin will approve.");
    }

    async function showRechargeModal() {
        const configSnap = await get(ref(db, 'settings/upiConfig'));
        const config = configSnap.exists() ? configSnap.val() : { upiId:"admin@upi", qrImageUrl:"", instruction:"Pay to this UPI ID" };
        const modalHtml = `
            <div class="modal fade" id="rechargeModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header"><h5>Recharge Wallet</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                        <div class="modal-body text-center">
                            ${config.qrImageUrl ? `<img src="${config.qrImageUrl}" style="max-width:150px;" class="mb-2">` : ""}
                            <div class="bg-light p-2 rounded"><strong>UPI ID:</strong> <span id="upiSpan">${config.upiId}</span> <button class="btn btn-sm btn-outline-secondary copyBtn">Copy</button><br><small>${config.instruction}</small></div>
                            <input type="number" id="rechargeAmount" class="form-control my-2" placeholder="Amount (₹)">
                            <input type="text" id="paymentId" class="form-control mb-2" placeholder="Transaction ID">
                            <button class="btn btn-primary w-100" id="submitRecharge">Submit Request</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modalEl = document.getElementById('rechargeModal');
        const modal = new bootstrap.Modal(modalEl);
        document.querySelector('.copyBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(config.upiId); showToast("Copied!"); });
        document.getElementById('submitRecharge')?.addEventListener('click', async () => {
            const amt = document.getElementById('rechargeAmount').value, pid = document.getElementById('paymentId').value;
            await requestRecharge(amt, pid);
            modal.hide(); modalEl.remove();
        });
        modal.show();
        modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());
    }

    function renderProfileDropdown() {
        const container = document.getElementById("profileContainer");
        if(!container) return;
        container.innerHTML = `
            <div class="position-relative">
                <i class="fas fa-user-circle fa-2x" id="profileIcon" style="cursor:pointer;"></i>
                <div id="profileDropdown" class="dropdown-menu-custom p-2">
                    <div class="border-bottom pb-2 mb-2">${currentUser.email}</div>
                    <div class="border-bottom pb-2 mb-2">Wallet: <span id="profileWalletBalance">₹0</span></div>
                    <button id="logoutProfile" class="btn btn-danger btn-sm w-100">Logout</button>
                </div>
            </div>
        `;
        const icon = document.getElementById("profileIcon");
        const dropdown = document.getElementById("profileDropdown");
        icon.onclick = (e) => { e.stopPropagation(); dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block'; };
        document.addEventListener('click', () => dropdown.style.display = 'none');
        document.getElementById("logoutProfile")?.addEventListener("click", logoutUser);
        attachWalletListener(currentUser.uid);
    }

    // Push notification permission & token
    async function requestNotificationPermission() {
        if(!messaging) { console.log("No FCM"); return; }
        if(Notification.permission === "granted") return;
        const perm = await Notification.requestPermission();
        if(perm === "granted") {
            try {
                const token = await getToken(messaging);
                if(token && currentUser) await set(ref(db, `fcmTokens/${currentUser.uid}`), token);
                console.log("FCM token saved");
            } catch(e) { console.log(e); }
        }
    }

    function listenForRealTimeNotifications() {
        if(!currentUser) return;
        const notifRef = query(ref(db, 'notifications'), orderByChild('toUserId'), equalTo(currentUser.uid));
        onValue(notifRef, (snap) => {
            const list = document.getElementById("notificationsList");
            if(!list) return;
            let items = [];
            snap.forEach(child => items.push({ id: child.key, ...child.val() }));
            items.sort((a,b) => b.timestamp - a.timestamp);
            list.innerHTML = items.map(n => `<div class="border-bottom p-2"><strong>${escapeHtml(n.title||'Message')}</strong><br>${escapeHtml(n.message)}<br><small>${new Date(n.timestamp).toLocaleString()}</small></div>`).join('');
        });
    }

    async function renderApp() {
        if(!currentUser) return renderAuthScreen();
        const userSnap = await get(ref(db, `users/${currentUser.uid}`));
        if(userSnap.val()?.banned) { showDialog("Banned", "Your account is banned.", "error"); logoutUser(); return; }
        if(userSnap.val()?.role === "admin") { showDialog("Admin", "Use admin panel.", "info"); logoutUser(); return; }

        document.getElementById("app").innerHTML = `
            <nav class="navbar d-flex justify-content-between align-items-center">
                <div class="logo">FileStore</div>
                <div class="d-flex gap-2 align-items-center">
                    <div class="wallet-badge"><i class="fas fa-wallet"></i> <span id="walletBalanceDisplay">₹0</span></div>
                    <div id="profileContainer"></div>
                </div>
            </nav>
            <div class="container mt-3">
                <ul class="nav nav-tabs justify-content-center mb-3">
                    <li class="nav-item"><button class="nav-link active" id="tabProducts">Products</button></li>
                    <li class="nav-item"><button class="nav-link" id="tabOrders">My Orders</button></li>
                    <li class="nav-item"><button class="nav-link" id="tabWallet">Wallet</button></li>
                    <li class="nav-item"><button class="nav-link" id="tabNotif">Notifications</button></li>
                </ul>
                <div id="tabContent"></div>
            </div>
            <div id="pushToast" class="toast-notify"></div>
        `;
        renderProfileDropdown();
        attachWalletListener(currentUser.uid);
        listenForRealTimeNotifications();

        const showTab = async (tab) => {
            const content = document.getElementById("tabContent");
            if(tab === 'products') {
                content.innerHTML = `<div class="row" id="productsContainer"></div>`;
                await loadProducts();
            } else if(tab === 'orders') {
                content.innerHTML = `<div id="ordersContainer"></div>`;
                await loadMyOrders();
            } else if(tab === 'wallet') {
                const bal = (await get(ref(db, `users/${currentUser.uid}/walletBalance`))).val() || 0;
                content.innerHTML = `
                    <div class="card p-4 text-center">
                        <h3>Your Balance</h3>
                        <h2 class="text-primary" id="walletBalanceLarge">₹${bal}</h2>
                        <button class="btn btn-primary mt-3" id="rechargeBtn">Recharge</button>
                    </div>
                `;
                document.getElementById("rechargeBtn").onclick = showRechargeModal;
            } else if(tab === 'notifications') {
                content.innerHTML = `<div class="card p-3"><h5>Notifications</h5><div id="notificationsList"></div></div>`;
                listenForRealTimeNotifications();
            }
        };
        document.getElementById("tabProducts").onclick = () => { setActive('tabProducts'); showTab('products'); };
        document.getElementById("tabOrders").onclick = () => { setActive('tabOrders'); showTab('orders'); };
        document.getElementById("tabWallet").onclick = () => { setActive('tabWallet'); showTab('wallet'); };
        document.getElementById("tabNotif").onclick = () => { setActive('tabNotif'); showTab('notifications'); };
        function setActive(id) {
            ["tabProducts","tabOrders","tabWallet","tabNotif"].forEach(i => document.getElementById(i).classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }
        await showTab('products');

        // Ask notification permission
        setTimeout(() => {
            if(Notification.permission !== "granted") {
                Swal.fire({ title: "Get notifications", text: "Allow to receive updates about new products?", icon: "info", showCancelButton: true }).then(res => {
                    if(res.isConfirmed) requestNotificationPermission();
                });
            } else requestNotificationPermission();
        }, 1000);
        if(messaging) onMessage(messaging, (payload) => {
            const toast = document.getElementById("pushToast");
            toast.innerText = `${payload.notification?.title}: ${payload.notification?.body}`;
            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 4000);
        });
    }

    function renderAuthScreen() {
        document.getElementById("app").innerHTML = `
            <div class="d-flex justify-content-center align-items-center vh-100">
                <div class="card p-4" style="width: 90%; max-width: 400px;">
                    <h3 class="text-center mb-3">FileStore</h3>
                    <ul class="nav nav-pills justify-content-center mb-3">
                        <li class="nav-item"><button class="nav-link active" id="loginTab">Login</button></li>
                        <li class="nav-item"><button class="nav-link" id="registerTab">Register</button></li>
                    </ul>
                    <div id="authForm"></div>
                </div>
            </div>
        `;
        const loginForm = () => {
            document.getElementById("authForm").innerHTML = `<input id="email" class="form-control mb-2" placeholder="Email"><input id="password" class="form-control mb-2" type="password" placeholder="Password"><button id="loginBtn" class="btn btn-primary w-100">Login</button>`;
            document.getElementById("loginBtn").onclick = () => handleLogin(document.getElementById("email").value, document.getElementById("password").value);
        };
        const registerForm = () => {
            document.getElementById("authForm").innerHTML = `<input id="email" class="form-control mb-2" placeholder="Email"><input id="password" class="form-control mb-2" type="password" placeholder="Password"><button id="regBtn" class="btn btn-primary w-100">Register</button>`;
            document.getElementById("regBtn").onclick = () => handleRegister(document.getElementById("email").value, document.getElementById("password").value);
        };
        document.getElementById("loginTab").onclick = () => { document.getElementById("loginTab").classList.add("active"); document.getElementById("registerTab").classList.remove("active"); loginForm(); };
        document.getElementById("registerTab").onclick = () => { document.getElementById("registerTab").classList.add("active"); document.getElementById("loginTab").classList.remove("active"); registerForm(); };
        loginForm();
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    onAuthStateChanged(auth, (user) => { currentUser = user; if(user) renderApp(); else renderAuthScreen(); });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
